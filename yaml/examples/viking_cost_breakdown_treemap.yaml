data:
  source: csv:yaml/examples/data/viking_costs.csv
  params:
    columns:
      - Project Management
      - Orbiter Spacecraft
      - Orbiter Science
      - Lander Spacecraft
      - Lander Science
      - Launch Vehicle
      - Operations
    auto_clean_currency: true
    fiscal_year_column: false
    truncate_at: Totals

chart:
  type: treemap
  output: viking_cost_breakdown_treemap
  title: "Viking project costs by component"
  subtitle: "Nominal costs in millions of dollars; total project cost: $1,057.9 million."
  source: "The Planetary Society, Planetary Exploration Budget Dataset."
  eyebrow: "MISSION ECONOMICS"
  note: "Nominal costs, not adjusted for inflation."

  labels:
    - Project Management
    - Orbiter Spacecraft
    - Orbiter Science
    - Lander Spacecraft
    - Lander Science
    - Launch Vehicle
    - Operations
  values:
    - '{{metadata.column_sums["Project Management"]}}'
    - '{{metadata.column_sums["Orbiter Spacecraft"]}}'
    - '{{metadata.column_sums["Orbiter Science"]}}'
    - '{{metadata.column_sums["Lander Spacecraft"]}}'
    - '{{metadata.column_sums["Lander Science"]}}'
    - '{{metadata.column_sums["Launch Vehicle"]}}'
    - '{{metadata.column_sums["Operations"]}}'
  # No-red palette: red is reserved in composition charts and must not paint a
  # neutral component. Colors align to the label order above; Orbiter and Lander
  # subsystems share a hue family (blue / purple) while overhead components
  # (management, launch, operations) use grays.
  colors:
    - Crater Shadow
    - Neptune Blue
    - Medium Neptune
    - Plasma Purple
    - Medium Plasma
    - Lunar Soil
    - Comet Dust
  show_labels: true
  label_wrap_length: 8
  show_percentages: true
