data:
  source: planetary_mission_budget.cassini

chart:
  type: line
  output: cassini_lifetime_cost_inflation_adjusted
  title: "Cassini's Lifetime Cost"
  subtitle: NASA's annual spending on the Cassini-Huygens mission, adjusted for inflation to {{metadata.inflation_adjusted_year}} dollars.
  source: "Planetary Exp. Budget Dataset planet.ly/pbd"

  x: "{{Fiscal Year}}"
  y: "{{Total Cost_adjusted_nnsi}}"

  color: Neptune Blue
  linestyle: "-"
  scale: millions
  fiscal_year_ticks: true
  marker: ""
  grid: true
  grid_axis: y
  tick_size: 12
  legend: false
  export_data: "{{data}}"
